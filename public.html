<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish Data - Gampaha Softball</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .publish-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .publish-title {
            color: #333;
            margin-bottom: 20px;
        }
        .publish-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px 0;
        }
        .publish-btn:hover {
            background: #218838;
            transform: scale(1.05);
        }
        .status-box {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .step {
            text-align: left;
            padding: 10px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .step.completed {
            background: #d4edda;
            color: #155724;
        }
        .step i {
            margin-right: 10px;
        }
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="publish-container">
            <h1 class="publish-title"><i class="fas fa-cloud-upload-alt"></i> Publish Rankings to Live Site</h1>
            
            <div class="info-box">
                <strong><i class="fas fa-info-circle"></i> How it works:</strong>
                <p>1. Click the button below to export your current data</p>
                <p>2. The data will be prepared for GitHub</p>
                <p>3. Live site will update in 2-3 minutes</p>
            </div>

            <div id="steps">
                <div class="step" id="step1">
                    <i class="far fa-circle"></i> Export data from localStorage
                </div>
                <div class="step" id="step2">
                    <i class="far fa-circle"></i> Prepare for GitHub
                </div>
                <div class="step" id="step3">
                    <i class="far fa-circle"></i> Ready to publish
                </div>
            </div>

            <button onclick="publishToGitHub()" class="publish-btn" id="publishBtn">
                <i class="fas fa-globe"></i> Publish to Live Site
            </button>

            <div id="status" class="status-box"></div>

            <div style="margin-top: 20px;">
                <a href="admin.html" class="back-btn" style="color: #667eea; text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Back to Admin Panel
                </a>
            </div>
        </div>
    </div>

    <script>
        function publishToGitHub() {
            // Show loading state
            document.getElementById('publishBtn').disabled = true;
            document.getElementById('publishBtn').innerHTML = '<span class="loading"></span> Publishing...';
            
            // Step 1: Export data from localStorage
            document.getElementById('step1').innerHTML = '<i class="fas fa-check-circle" style="color: #28a745;"></i> Exporting data...';
            
            try {
                // Get data from localStorage
                const savedData = localStorage.getItem('softballData');
                if (!savedData) {
                    throw new Error('No data found in localStorage');
                }
                
                document.getElementById('step1').innerHTML = '<i class="fas fa-check-circle" style="color: #28a745;"></i> Data exported successfully';
                
                // Step 2: Prepare for GitHub
                document.getElementById('step2').innerHTML = '<i class="fas fa-check-circle" style="color: #28a745;"></i> Preparing data...';
                
                // Parse and format the data
                const data = JSON.parse(savedData);
                
                document.getElementById('step2').innerHTML = '<i class="fas fa-check-circle" style="color: #28a745;"></i> Data prepared for GitHub';
                
                // Step 3: Create download file
                document.getElementById('step3').innerHTML = '<i class="fas fa-check-circle" style="color: #28a745;"></i> Creating backup file...';
                
                // Create a formatted JSON string
                const jsonStr = JSON.stringify(data, null, 2);
                
                // Create download link for backup
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'softball_rankings_backup.json';
                a.click();
                
                document.getElementById('step3').innerHTML = '<i class="fas fa-check-circle" style="color: #28a745;"></i> Backup file downloaded';
                
                // Show success message with instructions
                const status = document.getElementById('status');
                status.className = 'status-box success';
                status.style.display = 'block';
                status.innerHTML = `
                    <strong>✅ Backup file downloaded!</strong><br><br>
                    <strong>Next steps to update live site:</strong><br>
                    1. Go to your GitHub repository:<br>
                    <a href="https://github.com/Chamuditha99y/softball-rankings" target="_blank">https://github.com/Chamuditha99y/softball-rankings</a><br><br>
                    2. Click on <strong>data.js</strong><br><br>
                    3. Click the <strong>pencil icon</strong> (edit)<br><br>
                    4. Replace the entire SoftballData object with your backup data<br><br>
                    5. Scroll down and click <strong>"Commit changes"</strong><br><br>
                    6. Wait 2-3 minutes for the live site to update<br><br>
                    <a href="https://chamuditha99y.github.io/softball-rankings/public.html" target="_blank" style="color: #28a745;">Check live site after updating</a>
                `;
                
                document.getElementById('publishBtn').disabled = false;
                document.getElementById('publishBtn').innerHTML = '<i class="fas fa-globe"></i> Publish to Live Site';
                
            } catch (error) {
                // Show error
                const status = document.getElementById('status');
                status.className = 'status-box error';
                status.style.display = 'block';
                status.innerHTML = `❌ Error: ${error.message}`;
                
                document.getElementById('publishBtn').disabled = false;
                document.getElementById('publishBtn').innerHTML = '<i class="fas fa-globe"></i> Publish to Live Site';
            }
        }
    </script>
</body>
</html>
